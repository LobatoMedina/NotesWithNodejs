version: '3.8'

services:
  app:
    build: .
    container_name: notes-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/notesapp
      - JWT_SECRET=cambia_este_secreto_por_uno_seguro
      - JWT_EXPIRES_IN=1d
    depends_on:
      - mongo
    networks:
      - notes-network

  mongo:
    image: mongo:7
    container_name: notes-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - notes-network

networks:
  notes-network:
    driver: bridge

volumes:
  mongo-data:
